<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMK Configurator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1>ZMK Config</h1>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-target="settings-view">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    Settings
                </button>
                <button class="nav-item" data-target="keymap-view">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>
                    Keymap Editor
                </button>
                <button class="nav-item" data-target="animations-view">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Animations
                </button>
                <button class="nav-item" data-target="layout-view">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18M9 21V9"/></svg>
                    OLED Layout
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="content-area">
            <!-- Settings View -->
            <section id="settings-view" class="view active glass">
                <header class="view-header">
                    <h2>Configuration Settings</h2>
                    <p>Toggle features in your corne.conf</p>
                </header>
                <div class="settings-grid" id="settings-container">
                    <div class="loading">Loading configurations...</div>
                </div>
                <div class="actions">
                    <button id="save-settings" class="btn primary">Save Changes</button>
                </div>
            </section>

            <!-- Keymap View -->
            <section id="keymap-view" class="view">
                <header class="view-header glass">
                    <h2>Keymap Editor</h2>
                    <p>Edit your corne.keymap with live SVG preview</p>
                </header>
                <div class="split-view">
                    <div class="editor-pane glass">
                        <textarea id="keymap-editor" spellcheck="false"></textarea>
                    </div>
                    <div class="preview-pane glass" id="keymap-preview">
                        <div class="empty-state">Save to generate preview...</div>
                    </div>
                </div>
                <div class="actions glass" style="margin-top: 1rem;">
                    <button id="save-keymap" class="btn primary">Save & Update Preview</button>
                </div>
            </section>

            <!-- Animations View -->
            <section id="animations-view" class="view glass">
                <header class="view-header">
                    <h2>Manage Animations</h2>
                    <p>Add new GIF animations to your ZMK project</p>
                </header>
                <div class="form-container">
                    <div class="form-group">
                        <label>Animation Name</label>
                        <input type="text" id="anim-name" placeholder="e.g. bongo_cat">
                    </div>
                    <div class="form-group">
                        <label>GIF File Path</label>
                        <input type="text" id="anim-path" placeholder="e.g. animations/dudu.gif">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Duration (ms)</label>
                            <input type="number" id="anim-duration" value="960">
                        </div>
                        <div class="form-group">
                            <label>Rotation (degrees)</label>
                            <input type="number" id="anim-rotate" value="90">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Scale Factor</label>
                            <input type="number" id="anim-scale" step="0.1" value="1.0" min="0.1">
                        </div>
                        <div class="form-group">
                            <label>Skip Frames</label>
                            <input type="number" id="anim-skip-frames" value="0" min="0">
                        </div>
                    </div>
                    <button id="generate-anim" class="btn primary">Generate Animation Code</button>
                </div>
            </section>

            <!-- OLED Layout View -->
            <section id="layout-view" class="view glass">
                <header class="view-header">
                    <h2>OLED Layout Widgets</h2>
                    <p>Configure built-in widgets</p>
                </header>
                <div class="settings-grid" id="layout-container">
                    <!-- Specific configs for widgets loaded here -->
                </div>
                <div class="actions">
                    <button id="save-layout" class="btn primary">Save Widgets</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
